<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin RJ4DROID · Gestion des Apps</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        /* TABS SYSTEM */
        .tabs-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .admin-card { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        
        .upload-section { background: #f8f9fa; border: 2px dashed #ccc; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        #loader { display: none; color: var(--primary); font-weight: bold; margin: 10px 0; }
        .btn-upload { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }

        .status-container { display: flex; align-items: center; gap: 10px; background: #eee; padding: 10px; border-radius: 8px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-add { width: 100%; margin-top: 20px; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* LIST TABLE STYLE */
        .list-container { max-width: 800px; margin: auto; background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .app-icon-mini { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #eee; border: 1px solid #ddd; }
        .actions-btns { display: flex; gap: 5px; }
        .btn-sm { border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; color: white; font-size: 12px; }
        .bg-edit { background: var(--warning); color: black; }
        .bg-delete { background: var(--danger); }
        .bg-status { background: #6c757d; }

        #message { margin-top: 15px; text-align: center; font-weight: 600; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="showTab('tab-form')"><i class="fas fa-plus"></i> Fòm Ajout</button>
        <button class="tab-btn" onclick="showTab('tab-list')"><i class="fas fa-list"></i> Lis Apps yo</button>
    </div>

    <div id="tab-form" class="tab-content active">
        <div class="admin-card">
            <h2 id="form-title">Ajouter une App</h2>
            <div class="upload-section">
                <label>Icône de l'application</label>
                <input type="file" id="file" accept="image/*">
                <button type="button" class="btn-upload" onclick="upload()">Télécharger vers Drive</button>
                <div id="loader"><i class="fas fa-spinner fa-spin"></i> Upload en cours...</div>
                <input type="text" id="appIcon" placeholder="URL Thumbnail ap parèt la a" required>
                <input type="hidden" id="edit-id">
            </div>

            <form id="appForm">
                <div class="form-grid">
                    <div class="form-group full-width"><label>Nom</label><input type="text" id="appNom" required></div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="appType">
                            <option value="Outil">Outil</option>
                            <option value="Jeu">Jeu</option>
                            <option value="Social">Social</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Taille (MB)</label><input type="number" id="appTaille" required></div>
                    <div class="form-group full-width"><label>URL APK</label><input type="text" id="appUrl" required></div>
                    <div class="form-group full-width"><label>Description</label><textarea id="appDesc" rows="3"></textarea></div>
                    <div class="form-group full-width status-container">
                        <label class="switch"><input type="checkbox" id="appOnline" checked><span class="slider"></span></label>
                        <span>App est <b>Online</b></span>
                    </div>
                </div>
                <button type="submit" class="btn-add" id="btn-submit">PUBLIER L'APP</button>
            </form>
        </div>
    </div>

    <div id="tab-list" class="tab-content">
        <div class="list-container">
            <table>
                <thead>
                    <tr>
                        <th>Icon</th>
                        <th>Nom</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="app-list-body"></tbody>
            </table>
        </div>
    </div>

  <script>
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if (window.event && window.event.currentTarget) {
            window.event.currentTarget.classList.add('active');
        }
    }

    const appRef = firebase.database().ref('RJFORDROID/APPS');

    // --- UPLOAD LOGIC KORIJÉ ---
    function upload() {
        const fileInput = document.getElementById("file");
        const file = fileInput.files[0];
        if (!file) return alert("Tanpri chwazi yon imaj!");
        
        document.getElementById("loader").style.display = "block";
        const reader = new FileReader();
        
        reader.onload = function () {
            const formData = new FormData();
            formData.append("file", reader.result.split(",")[1]);
            formData.append("name", file.name);
            formData.append("type", file.type);
            
            fetch("https://script.google.com/macros/s/AKfycbxHjVBNTOlj6xBUp_fl-aVbPSFZRiMQB77_YIvFeB79uq2Hx9P_r7HADZTYj9WElsXkug/exec", {
                method: "POST", body: formData
            }).then(r => r.json()).then(res => {
                document.getElementById("loader").style.display = "none";
                if (!res.success) return alert("Erreur: " + res.error);
                
                // NOUVÉ LOJIK: Ekstrè ID a epi kreye lyen Thumbnail la
                const fileId = res.url.match(/\/d\/([^\/]+)/)?.[1] || "";
                if(fileId) {
                    // Lyen sa a pi estab pou afiche imaj nan paj web
                    const thumbnailLink = `https://lh3.googleusercontent.com/u/0/d/${fileId}`;
                    document.getElementById("appIcon").value = thumbnailLink;
                    alert("✅ Imaj moute ak siksè!");
                }
            }).catch(err => { 
                document.getElementById("loader").style.display = "none";
                alert("Erreur: " + err); 
            });
        };
        reader.readAsDataURL(file);
    }

    // --- FETCH LIST ---
    appRef.on('value', (snap) => {
        const tbody = document.getElementById('app-list-body');
        if (!tbody) return;
        tbody.innerHTML = "";
        
        snap.forEach((child) => {
            const app = child.val();
            const id = child.key;
            tbody.innerHTML += `
                <tr>
                    <td><img src="${app.Icon}" class="app-icon-mini" onerror="this.src='https://via.placeholder.com/45?text=No+Img'"></td>
                    <td><b>${app.Nom}</b></td>
                    <td>${app.Online ? '🟢 Online' : '🔴 Offline'}</td>
                    <td class="actions-btns">
                        <button class="btn-sm bg-edit" onclick="editApp('${id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-sm bg-status" onclick="toggleOnline('${id}', ${app.Online})"><i class="fas fa-sync"></i></button>
                        <button class="btn-sm bg-delete" onclick="deleteApp('${id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });
    });

    // --- SAVE / EDIT ---
    document.getElementById('appForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const data = {
            Nom: document.getElementById('appNom').value,
            Type: document.getElementById('appType').value,
            Taille: document.getElementById('appTaille').value + " MB",
            Icon: document.getElementById('appIcon').value,
            Url: document.getElementById('appUrl').value,
            Desc: document.getElementById('appDesc').value,
            Online: document.getElementById('appOnline').checked
        };
        
        if(id) {
            appRef.child(id).update(data).then(() => resetAll());
        } else {
            appRef.push(data).then(() => resetAll());
        }
    });

    function editApp(id) {
        appRef.child(id).once('value', (s) => {
            const a = s.val();
            document.getElementById('edit-id').value = id;
            document.getElementById('appNom').value = a.Nom;
            document.getElementById('appIcon').value = a.Icon;
            document.getElementById('appTaille').value = parseInt(a.Taille) || 0;
            document.getElementById('appUrl').value = a.Url;
            document.getElementById('appDesc').value = a.Desc;
            document.getElementById('appOnline').checked = a.Online;
            
            document.getElementById('btn-submit').innerText = "MODIFIER";
            document.getElementById('form-title').innerText = "Mode Édition";
            showTab('tab-form');
        });
    }

    function toggleOnline(id, stat) { appRef.child(id).update({ Online: !stat }); }
    
    function deleteApp(id) { 
        if(confirm("Èske ou vle efase app sa a nèt?")) {
            appRef.child(id).remove(); 
        }
    }
    
    function resetAll() {
        document.getElementById('appForm').reset();
        document.getElementById('edit-id').value = "";
        document.getElementById('btn-submit').innerText = "PUBLIER L'APP";
        document.getElementById('form-title').innerText = "Ajouter une App";
        alert("Operasyon an fèt ak siksè!");
        showTab('tab-list');
    }
</script>

</body>
</html>
